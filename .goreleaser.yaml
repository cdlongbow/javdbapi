version: 2

project_name: javdbapi

builds:
  - id: javdbapi
    main: ./cmd/javdbapi
    binary: javdbapi
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: javdbapi
    ids:
      - javdbapi
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - README.zh.md
      - LICENSE
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Breaking Changes
      regexp: '^.*?[a-z]+(\(.+\))?!:.+$'
      order: 0
    - title: Features
      regexp: '^.*?feat(\(.+\))?:.+$'
      order: 1
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?:.+$'
      order: 2
    - title: Others
      order: 999
